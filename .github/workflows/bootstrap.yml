name: Bootstrap source tree

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/bootstrap.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  unpack:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Unpack verified source
        shell: bash
        run: |
          base64 --decode renameflow.tar.gz.b64 > /tmp/renameflow.tar.gz
          tar -xzf /tmp/renameflow.tar.gz
          rm -f renameflow.tar.gz.b64 .github/workflows/bootstrap.yml
      - name: Publish source
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "feat: implement RenameFlow MVP"
          git push
